version: '3'

tasks:
  default:
    cmds:
      - task: test

  fmt:
    desc: Format Go source
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  cover:
    desc: Run tests with coverage report
    cmds:
      - go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - go tool cover -html=coverage.txt -o coverage.html

  bench:
    desc: Run benchmarks
    cmds:
      - go test -bench=. -benchmem ./...

  lint:
    desc: Lint (vet + gofmt check)
    cmds:
      - go vet ./...
      - 'test -z "$(gofmt -l .)"'

  tidy:
    desc: Tidy module dependencies
    cmds:
      - go mod tidy

  ci:
    desc: Full CI pipeline
    cmds:
      - task: lint
      - task: test
