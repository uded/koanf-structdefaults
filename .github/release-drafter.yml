name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: 'Features'
    labels:
      - 'feature'
      - 'enhancement'
      - 'feat'
  - title: 'Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: 'Tests'
    labels:
      - 'test'
      - 'tests'
  - title: 'Chores'
    labels:
      - 'chore'
      - 'dependencies'
      - 'refactor'
      - 'docs'
      - 'ci'
      - 'perf'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'
autolabeler:
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?:/i'
  - label: 'test'
    title:
      - '/^test(\(.+\))?:/i'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?:/i'
      - '/^refactor(\(.+\))?:/i'
      - '/^docs(\(.+\))?:/i'
      - '/^ci(\(.+\))?:/i'
      - '/^perf(\(.+\))?:/i'
version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'feature'
      - 'minor'
  patch:
    labels:
      - 'fix'
      - 'chore'
      - 'test'
      - 'patch'
  default: patch
template: |
  ## Changes

  $CHANGES
